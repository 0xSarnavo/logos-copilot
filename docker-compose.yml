services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: logos
      POSTGRES_PASSWORD: logos
      POSTGRES_DB: logos_copilot
    ports:
      - "5433:5432"          # host:container — 5433 avoids clashing with a local Postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logos -d logos_copilot"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  server:
    build: .
    environment:
      DATABASE_URL: postgresql://logos:logos@db:5432/logos_copilot
      EMBEDDER: ${EMBEDDER:-hash}
      MCP_PORT: "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata: {}
  caddy_data: {}
