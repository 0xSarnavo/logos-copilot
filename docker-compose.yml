services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: logos
      POSTGRES_PASSWORD: logos
      POSTGRES_DB: logos_copilot
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logos -d logos_copilot"]
      interval: 3s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  server:
    build: .
    environment:
      DATABASE_URL: postgresql://logos:logos@db:5432/logos_copilot
      MCP_HOST: "0.0.0.0"            # reachable from host (auth guard satisfied by AUTH_TOKEN)
      AUTH_TOKEN: ${AUTH_TOKEN}
      EMBEDDER: fastembed
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    build: .
    command: python -m logos_copilot.web
    environment:
      DATABASE_URL: postgresql://logos:logos@db:5432/logos_copilot
      WEB_HOST: "0.0.0.0"
      AUTH_TOKEN: ${AUTH_TOKEN}
      EMBEDDER: fastembed
    ports:
      - "8800:8800"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: {}
